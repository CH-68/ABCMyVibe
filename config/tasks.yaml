semantic_evaluation_task:
  description: >
    Perform a semantic compliance evaluation of the target document located at {document_text}.
    
    1. Read the policy rules from your Knowledge Base.
    2. Read the user document.
    3. Evaluate the user document against EVERY rule in the policy.
    4. For every rule, extract the exact citation (Page, Section, Topic) from both documents.
    5. Categorize the verdict (complied, partially_complied, deviation) based on intent, not just words.
    
    Ensure you catch verbal softening (e.g., user wrote "should", policy mandates "must").
  expected_output: >
    A perfectly formatted JSON object matching the requested ComplianceReportSchema structure.