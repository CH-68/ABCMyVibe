# config/tasks.yaml - Defines specific, sequential compliance tasks.\n# Structure: Task Name: [Description, Input Source/Context]\n\n1. Initial Knowledge Ingestion:\n  - description: \"Read and summarize all provided knowledge base documents to build a comprehensive internal understanding of current standards.\"\n  - context_type: KnowledgeBase\n  - output_variable: KNOWLEDGE_SUMMARY\n\n2. Gap Identification:\n  - description: \"Cross-reference the 'Target Document' text against the 'KNOWLEDGE_SUMMARY'. Systematically list every instance where the target document deviates from the known standards.\"\n  - context_type: CrossReference\n  - input_sources: [TARGET_DOCUMENT, KNOWLEDGE_SUMMARY]\n  - output_variable: COMPLIANCE_GAPS\n\n3. Suggest Edits:\n  - description: \"For every gap found in 'COMPLIANCE_GAPS', write a concrete, actionable edit suggestion including the exact location and the required revision.\"\n  - context_type: Editing\n  - input_sources: [COMPLIANCE_GAPS]\n  - output_variable: FINAL_EDITS\n